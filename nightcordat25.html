    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: #1a1a2e; /* 深色背景符合團體風格 */
            color: #e0e0e0;
        }
        header {
            background-color: #4a266a;
            padding: 40px;
            text-align: center;
            border-bottom: 4px solid #884499;
        }
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #bb86fc;
            text-decoration: none;
        }
        .member-card {
            background: #16213e;
            margin-bottom: 20px;
            padding: 20px;
            border-left: 10px solid #884499;
            border-radius: 5px;
        }
        h2 { color: #bb86fc; }
        .quote {
            font-style: italic;
            color: #999;
            margin-top: 10px;
        }
    </style>

<body>

<header>
    <h1>25點，Nightcord見。</h1>
    <p>「這份痛苦，只有我們能理解。」</p>
</header>

<div class="container">
    <a href="index.html" class="back-link">← 返回首頁</a>

    <section>
        <div class="member-card">
            <h2>宵崎 奏 (Yoisaki Kanade)</h2>
            <p>團體內的作曲者。為了創作出「能拯救他人」的音樂而不斷努力。</p>
            <p class="quote">「我必須...繼續寫歌才行。」</p>
        </div>

        <div class="member-card">
            <h2>朝比奈 真冬 (Asahina Mafuyu)</h2>
            <p>作詞擔當。雖然在學校是優等生，但在 Nightcord 中展現了失去情感的一面。</p>
        </div>

        <div class="member-card">
            <h2>東雲 繪名 (Shinonome Ena)</h2>
            <p>繪圖擔當。性格好強，一直追求著他人對其畫作的認可。</p>
        </div>

        <div class="member-card">
            <h2>曉山 瑞希 (Akiyama Mizuki)</h2>
            <p>影片製作擔當。隱藏著不為人知的秘密，熱愛時尚與可愛的事物。</p>
        </div>
    </section>
</div>

</body>
