<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25點，Nightcord見。 - 角色介紹</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: #1a1a2e;
            color: #e0e0e0;
        }
        header {
            background-color: #4a266a;
            padding: 40px;
            text-align: center;
            border-bottom: 4px solid #884499;
        }
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #bb86fc;
            text-decoration: none;
        }
        .member-card {
            background: #16213e;
            margin-bottom: 20px;
            padding: 20px;
            border-left: 10px solid #884499;
            border-radius: 5px;
        }
        h2 { color: #bb86fc; }

        /* 互動小遊戲樣式 */
        .game-container {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        #kanade-img {
            max-width: 250px;
            cursor: pointer;
            transition: filter 0.2s, transform 0.1s;
            border-radius: 10px;
        }
        #kanade-img:active {
            transform: scale(0.95);
        }
        .game-status {
            margin-top: 10px;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<header>
    <h1>25點，Nightcord見。</h1>
    <p>「這份痛苦，只有我們能理解。」</p>
</header>

<div class="container">
    <a href="index.html" class="back-link">← 返回首頁</a>

    <section>
        <div class="member-card">
            <h2>宵崎 奏 (Yoisaki Kanade)</h2>
            <p>團體內的作曲者。為了創作出「能拯救他人」的音樂而不斷努力。</p>
            
            <div class="game-container" id="kanade-game">
                <img id="kanade-img" 
                     src="https://p3-pc-sign.douyinpic.com/tos-cn-i-0813/owCWeABHfDovdA636YvDCLsiAc1iEAzWAIgAbR~tplv-dy-aweme-images:q75.webp?biz_tag=aweme_images&from=327834062&lk3s=138a59ce&s=PackSourceEnum_SEARCH&sc=image&se=false&x-expires=1778601600&x-signature=%2Fql91pyLv%2Feo0k5skLaezYdwA%2B8%3D" 
                     alt="奏在吃泡麵">
                <p id="kanade-text" class="game-status">奏在吃泡麵</p>
            </div>
        </div>

        <div class="member-card"><h2>朝比奈 真冬</h2><p>作詞擔當。</p></div>
        <div class="member-card"><h2>東雲 繪名</h2><p>繪圖擔當。</p></div>
        <div class="member-card"><h2>曉山 瑞希</h2><p>影片製作擔當。</p></div>
    </section>
</div>

<script>
    let clicks = 0;
    const maxClicks = 10;
    const imgElement = document.getElementById('kanade-img');
    const textElement = document.getElementById('kanade-text');

    imgElement.addEventListener('click', function() {
        clicks++;
        
        if (clicks < maxClicks) {
            // 每點擊一次變暗 10% (1 - 0.1 * clicks)
            let brightness = 1 - (clicks * 0.1);
            imgElement.style.filter = `brightness(${brightness})`;
            textElement.innerText = `奏在吃泡麵 (還剩 ${maxClicks - clicks} 口)`;
        } else {
            // 點擊十次後變換
            imgElement.src = "https://p3-pc-sign.douyinpic.com/tos-cn-i-0813c001/oAIAgEfeTByQruB7PZ8PAALIAAfG5PABA6jwiE~tplv-dy-aweme-images:q75.webp?biz_tag=aweme_images&from=327834062&lk3s=138a59ce&s=PackSourceEnum_SEARCH&sc=image&se=false&x-expires=1778576400&x-signature=HxnT3bgXfRMu1r9L5sPHNMoqd8M%3D";
            imgElement.style.filter = "brightness(1)"; // 重置亮度
            textElement.innerText = "要趕工了";
            
            // 讓圖片點擊功能失效（趕工中不能再吃）
            imgElement.style.cursor = "default";
        }
    });
</script>

</body>
</html>
